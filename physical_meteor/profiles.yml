physical_meteor:
  target: dev_duckdb
  outputs:
    dev_duckdb:
      type: duckdb
      path: '/opt/airflow/data/physical_meteor_db.duckdb'
      database: physical_meteor_db 
      schema: main
      threads: 4
      
      extensions:
        - httpfs
        - aws
        - delta
        
      # ❌ REMOVE the 'settings' block entirely
      # ✅ KEEP the settings block for engine-level behavior
      settings:
        s3_use_instance_profile: false
        s3_region: "{{ env_var('AWS_REGION') }}"

      # ✅ ADD the 'secrets' block
      secrets:
        - type: s3
          region: "{{ env_var('AWS_REGION') }}"
          key_id: "{{ env_var('AWS_ACCESS_KEY_ID') }}"
          secret: "{{ env_var('AWS_SECRET_ACCESS_KEY') }}"

    # -------------------------------------------------------------------------
    # LEGACY / ALTERNATIVE TARGETS
    # -------------------------------------------------------------------------
    prod_snowflake:
      type: snowflake
      account: "{{ env_var('SNOWFLAKE_ACCOUNT') }}"
      user: "{{ env_var('SNOWFLAKE_USER') }}"
      password: "{{ env_var('SNOWFLAKE_PASSWORD') }}"
      role: ACCOUNTADMIN
      database: "{{ env_var('SNOWFLAKE_DATABASE') }}"
      warehouse: "{{ env_var('SNOWFLAKE_WAREHOUSE') }}"
      schema: "{{ env_var('SNOWFLAKE_SCHEMA') }}"
      threads: 4
      client_session_keep_alive: False

    dev_postgres:
      type: postgres
      host: postgres
      user: airflow
      password: "{{ env_var('POSTGRES_PASS') }}"
      port: 5432
      dbname: PHYSICAL_METEOR_DB
      schema: RAW
      threads: 4