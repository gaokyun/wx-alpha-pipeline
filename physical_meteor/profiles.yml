# profiles.yml
physical_meteor:
  target: dev_duckdb
  outputs:
    dev_duckdb:
      type: duckdb
      path: "{{ env_var('DUCKDB_PATH', '/opt/airflow/data/local_catalog.duckdb') }}"
      threads: 1  # <--- THIS MUST BE 1
      extensions:
        - httpfs
        - delta
        - aws
        - postgres
      
      # Attach PostgreSQL database to stream Gold models directly
      attach:
        - path: "postgresql://{{ env_var('POSTGRES_USERNAME', 'airflow') }}:{{ env_var('POSTGRES_PASS', 'airflow') }}@postgres:5432/PHYSICAL_METEOR_DB"
          type: postgres
          alias: PHYSICAL_METEOR_DB

      
      # ✅ THE FIX: Use the dedicated 'secrets' array
      secrets:
        - type: s3
          key_id: "{{ env_var('OCI_ACCESS_KEY') }}"
          secret: "{{ env_var('OCI_SECRET_KEY') }}"
          region: "us-ashburn-1"
          endpoint: "idt2nq7cpbfu.compat.objectstorage.us-ashburn-1.oraclecloud.com"
          url_style: "path"
          use_ssl: true

      # Keep performance settings here, but no credentials
      settings:
        parquet_metadata_cache: true
        http_retries: 5
        http_retry_backoff: 2
        memory_limit: '4GB'              # Caps DuckDB so it doesn't hit the OS limit
        # max_temp_directory_size: '10GB'  # Prevents filling the entire disk
        # temp_directory: '/opt/airflow/data/duckdb_tmp' # Ensure this folder exists
        threads: 1
        # Limits how many parallel range-requests DuckDB makes per file
        max_memory: '12GB' # Leave some headroom for the OS and Airflow

      # # ✅ ADD the 'secrets' block
      # secrets:
      #   - type: s3
      #     region: "{{ env_var('AWS_REGION') }}"
      #     key_id: "{{ env_var('AWS_ACCESS_KEY_ID') }}"
      #     secret: "{{ env_var('AWS_SECRET_ACCESS_KEY') }}"

    # -------------------------------------------------------------------------
    # LEGACY / ALTERNATIVE TARGETS
    # -------------------------------------------------------------------------
    prod_snowflake:
      type: snowflake
      account: "{{ env_var('SNOWFLAKE_ACCOUNT') }}"
      user: "{{ env_var('SNOWFLAKE_USER') }}"
      password: "{{ env_var('SNOWFLAKE_PASSWORD') }}"
      role: ACCOUNTADMIN
      database: "{{ env_var('SNOWFLAKE_DATABASE') }}"
      warehouse: "{{ env_var('SNOWFLAKE_WAREHOUSE') }}"
      schema: "{{ env_var('SNOWFLAKE_SCHEMA') }}"
      threads: 4
      client_session_keep_alive: False

    dev_postgres:
      type: postgres
      host: postgres
      user: "{{ env_var('POSTGRES_USERNAME') }}"
      password: "{{ env_var('POSTGRES_PASS') }}"
      port: 5432
      dbname: PHYSICAL_METEOR_DB
      schema: RAW
      threads: 4

    adw_prod:
      type: oracle
      user: "{{ env_var('ORACLE_USER', 'PHYSICAL_METEOR_RAW') }}"
      pass: "{{ env_var('ORACLE_PASSWORD', '***REMOVED***') }}"
      connection_string: "(description=(address=(protocol=tcps)(port=1522)(host={{ env_var('ORACLE_HOST', 'adb.us-ashburn-1.oraclecloud.com') }}))(connect_data=(service_name={{ env_var('ORACLE_SERVICE', 'g6fd1d6c71405c0_meteor0ykg0aidw_high.adb.oraclecloud.com') }}))(security=(ssl_server_dn_match=no)))"
      schema: "{{ env_var('ORACLE_SCHEMA', 'PHYSICAL_METEOR_RAW') }}"
      threads: 4

    heatwave_prod:
      type: mysql
      host: [heatwave-ip]
      user: meteor_admin
      pass: "{{ env_var('POSTGRES_PASS') }}"
      port: 3306  

      