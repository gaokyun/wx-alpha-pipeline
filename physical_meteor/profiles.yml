# profiles.yml
physical_meteor:
  target: dev_duckdb
  outputs:
    dev_duckdb:
      type: duckdb
      path: "{{ env_var('DUCKDB_PATH', '/opt/airflow/data/PHYSICAL_METEOR_DB.duckdb') }}"
      extensions:
        - httpfs
        - delta
        - aws
      
      # ✅ THE FIX: Use the dedicated 'secrets' array
      secrets:
        - type: s3
          key_id: "{{ env_var('OCI_ACCESS_KEY') }}"
          secret: "{{ env_var('OCI_SECRET_KEY') }}"
          region: "us-ashburn-1"
          endpoint: "idt2nq7cpbfu.compat.objectstorage.us-ashburn-1.oraclecloud.com"
          url_style: "path"
          use_ssl: true

      # Keep performance settings here, but no credentials
      settings:
        parquet_metadata_cache: true
        http_retries: 5
        http_retry_backoff: 2
        # Limits how many parallel range-requests DuckDB makes per file
        max_memory: '16GB' # Leave some headroom for the OS and Airflow

      # # ✅ ADD the 'secrets' block
      # secrets:
      #   - type: s3
      #     region: "{{ env_var('AWS_REGION') }}"
      #     key_id: "{{ env_var('AWS_ACCESS_KEY_ID') }}"
      #     secret: "{{ env_var('AWS_SECRET_ACCESS_KEY') }}"

    # -------------------------------------------------------------------------
    # LEGACY / ALTERNATIVE TARGETS
    # -------------------------------------------------------------------------
    prod_snowflake:
      type: snowflake
      account: "{{ env_var('SNOWFLAKE_ACCOUNT') }}"
      user: "{{ env_var('SNOWFLAKE_USER') }}"
      password: "{{ env_var('SNOWFLAKE_PASSWORD') }}"
      role: ACCOUNTADMIN
      database: "{{ env_var('SNOWFLAKE_DATABASE') }}"
      warehouse: "{{ env_var('SNOWFLAKE_WAREHOUSE') }}"
      schema: "{{ env_var('SNOWFLAKE_SCHEMA') }}"
      threads: 4
      client_session_keep_alive: False

    dev_postgres:
      type: postgres
      host: postgres
      user: "{{ env_var('POSTGRES_USERNAME') }}"
      password: "{{ env_var('POSTGRES_PASS') }}"
      port: 5432
      dbname: PHYSICAL_METEOR_DB
      schema: RAW
      threads: 4
      