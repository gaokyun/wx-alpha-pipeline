# profiles.yml located at /usr/app/physical_meteor/profiles.yml

physical_meteor:
  target: dev
  outputs:
    prod_oracledw:
      type: oracle
      host: "{{ env_var('ORACLE_HOST') }}"
      user: "{{ env_var('ORACLE_USER') }}"
      pass: "{{ env_var('ORACLE_PASSWORD') }}"
      # The '| int' filter is critical here because dbt expects port to be an integer, 
      # but environment variables are parsed as strings by default.
      port: "{{ env_var('ORACLE_PORT') | int }}"
      service: "{{ env_var('ORACLE_SERVICE') }}"
      schema: "{{ env_var('ORACLE_SCHEMA') }}"
      
      # For modern Oracle Autonomous DW or secured connections, protocol is usually TCPS.
      # Change to 'tcp' if you are connecting to a standard internal unencrypted instance.
      protocol: tcps

    prod:
      type: snowflake
      account: "{{ env_var('SNOWFLAKE_ACCOUNT') }}"
      user: "{{ env_var('SNOWFLAKE_USER') }}"
      password: "{{ env_var('SNOWFLAKE_PASSWORD') }}"
      # Defaulting to ACCOUNTADMIN based on your previous SQL initialization, 
      # but you can change this if you created a specific dbt role.
      role: ACCOUNTADMIN
      database: "{{ env_var('SNOWFLAKE_DATABASE') }}"
      warehouse: "{{ env_var('SNOWFLAKE_WAREHOUSE') }}"
      schema: "{{ env_var('SNOWFLAKE_SCHEMA') }}"
      threads: 4
      client_session_keep_alive: False

    # profiles.yml for Postgres
    dev:
      type: postgres
      host: postgres
      user: airflow
      password: "{{ env_var('POSTGRES_PASS') }}"
      port: 5432
      dbname: PHYSICAL_METEOR_DB
      schema: RAW
      threads: 4