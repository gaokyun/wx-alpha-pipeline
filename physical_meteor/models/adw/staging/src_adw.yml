      tags:
      - temporal
      - date
      tests:
      - not_null
    - &id027
      name: forecast_cycle
      description: Hour of the model run cycle (UTC).
      tags:
      - temporal
      - hour
      tests:
      - not_null
      - accepted_values:
          values:
          - 0
          - 12
    - &id028
      name: step_hours
      description: Forecast lead time hours from the base model run time.
      tags:
      - temporal
      - forecast
      tests:
      - not_null
    - &id029
      name: valid_time
      description: The targeted UTC timestamp representing when the forecast is valid.
      tags:
      - temporal
      - date
      tests:
      - not_null
    - &id030
      name: isobaricinhpa
      description: Isobaric pressure level height in hPa.
      tags:
      - meteorological
      - pressure
      tests:
      - not_null
    - &id031
      name: gh
      description: Ensemble spread (standard deviation) for geopotential height in
        meters.
      tags:
      - meteorological
      - height
      tests:
      - not_null
    - &id032
      name: t
      description: Ensemble spread (standard deviation) for temperature in Kelvin.
      tags:
      - meteorological
      - temperature
      tests:
      - not_null
