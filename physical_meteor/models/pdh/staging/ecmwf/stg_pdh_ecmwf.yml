version: 2
models:
- name: stg_pdh_ecmwf_aifs_spread
  description: Staging model for ECMWF AIFS ensemble spread data containing standard
    deviation measures.
  columns:
  - name: cycle_date
    description: The date when the weather model run cycle was initialized.
    tags: &id001
    - temporal
    - date
    tests:
    - not_null
  - name: cycle_hour
    description: The cycle run hour (UTC, e.g., 0, 6, 12, or 18).
    tags: &id002
    - temporal
    - hour
    tests:
    - not_null
    - accepted_values:
        values:
        - 0
        - 12
  - name: forecast_step_hours
    description: Forecast lead time hours from the model initialization.
    tags: &id003
    - temporal
    - forecast
    tests:
    - not_null
  - name: valid_date
    description: The date when the forecast is valid.
    tags: &id004
    - temporal
    - date
    tests:
    - not_null
  - name: valid_hour
    description: The hour (UTC) when the forecast is valid.
    tags: &id005
    - temporal
    - hour
    tests:
    - not_null
  - name: lat
    description: Physical latitude value in degrees (-90 to 90).
    tags: &id006
    - spatial
    - coordinate
    tests:
    - not_null
  - name: lon
    description: Physical longitude value in degrees (-180 to 360).
    tags: &id007
    - spatial
    - coordinate
    tests:
    - not_null
  - name: lat_i
    description: Transform latitude with Shift by 90/360 to ensure positive values,
      then scale to remove decimals.
    tags: &id008
    - spatial
    - coordinate
    tests:
    - not_null
  - name: lon_i
    description: Transform longitude with Shift by 180 to ensure positive values,
      then scale to remove decimals.
    tags: &id009
    - spatial
    - coordinate
    tests:
    - not_null
  - name: pressure_level_hpa
    description: Isobaric pressure level in hPa (e.g. 500, 850).
    tags: &id011
    - meteorological
    - pressure
    tests:
    - not_null
  - name: temp_spread_kelvin
    description: Ensemble spread (standard deviation) for temperature in Kelvin.
    tags: &id012
    - meteorological
    - temperature
    tests:
    - not_null
  - name: temp_spread_celsius
    description: Ensemble spread (standard deviation) for temperature in Celsius.
    tags: &id013
    - meteorological
    - temperature
    tests:
    - not_null
  - name: geopotential_height_spread_m
    description: Ensemble spread (standard deviation) for geopotential height in meters.
    tags: &id014
    - meteorological
    - height
    tests:
    - not_null
  - name: surrogate_merge_key
    description: Primary key placeholder for upsert operations.
    tags: &id010
    - key
    - metadata
    tests:
    - unique
    - not_null
