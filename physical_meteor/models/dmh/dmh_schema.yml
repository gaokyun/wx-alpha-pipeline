version: 2
models:
- name: stg_dmh_gfs_upper
  description: Staging model preparing raw weather variables for the model gfs_upper
    in DuckDB-MySQL Heatwave (DMH).
  columns:
  - name: cycle_date
    description: The date when the weather model run cycle was initialized.
    tags:
    - temporal
    - date
    tests:
    - not_null
  - name: cycle_hour
    description: The cycle run hour (UTC, e.g., 0, 6, 12, or 18).
    tags:
    - temporal
    - hour
    tests:
    - not_null
    - accepted_values:
        values:
        - 0
        - 6
        - 12
        - 18
  - name: forecast_step_hours
    description: Forecast lead time hours from the model initialization.
    tags:
    - temporal
    - forecast
    tests:
    - not_null
  - name: valid_date
    description: The date when the forecast is valid.
    tags:
    - temporal
    - date
    tests:
    - not_null
  - name: valid_hour
    description: The hour (UTC) when the forecast is valid.
    tags:
    - temporal
    - hour
    tests:
    - not_null
  - name: lat
    description: Physical latitude value in degrees (-90 to 90).
    tags:
    - spatial
    - coordinate
    tests:
    - not_null
  - name: lon
    description: Physical longitude value in degrees (-180 to 360).
    tags:
    - spatial
    - coordinate
    tests:
    - not_null
  - name: lat_i
    description: transform latitude with Shift by 90/360 to ensure positive values,
      then scale to remove decimals
    tags:
    - spatial
    - coordinate
    tests:
    - not_null
  - name: lon_i
    description: transform longitude with Shift by 180 to ensure positive values,
      then scale to remove decimals
    tags:
    - spatial
    - coordinate
    tests:
    - not_null
  - name: pressure_level_hpa
    description: Isobaric pressure level in hPa (e.g. 500, 850).
    tags:
    - meteorological
    - pressure
    tests:
    - not_null
  - name: geopotential_height_m
    description: Geopotential height of the pressure level in meters.
    tags:
    - meteorological
    - height
    tests:
    - not_null
  - name: temp_kelvin
    description: Air temperature in Kelvin.
    tags:
    - meteorological
    - temperature
    tests:
    - not_null
  - name: temp_celsius
    description: Air temperature converted to Celsius.
    tags:
    - meteorological
    - temperature
    tests:
    - not_null
  - name: u_wind_m_s
    description: Zonal wind speed component (eastward wind velocity) in m/s.
    tags:
    - meteorological
    - wind
    tests:
    - not_null
  - name: v_wind_m_s
    description: Meridional wind speed component (northward wind velocity) in m/s.
    tags:
    - meteorological
    - wind
    tests:
    - not_null
  - name: surrogate_merge_key
    description: Primary key placeholder for upsert operations.
    tags:
    - key
    - metadata
    tests:
    - unique
    - not_null
