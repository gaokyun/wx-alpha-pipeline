  - name: temp_2m_kelvin
    description: Air temperature at 2 meters above ground in Kelvin.
    tags: &id012
    - meteorological
    - temperature
    tests:
    - not_null
    - dbt_utils.expression_is_true:
        expression: "temp_2m_kelvin >= 180 AND temp_2m_kelvin <= 340"
        config:
          severity: warn
  - name: temp_2m_celsius
    description: Air temperature at 2 meters above ground converted to Celsius.
    tags: &id013
    - meteorological
