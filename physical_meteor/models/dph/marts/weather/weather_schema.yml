version: 2
models:
- name: dim_grid_points
  description: Dimension model mapping spatial coordinates to integer grid point coordinates.
  columns:
  - name: lat_i
    description: Transform latitude with Shift by 90/360 to ensure positive values,
      then scale to remove decimals.
    tags: &id001
    - spatial
    - coordinate
    tests:
    - not_null
  - name: lon_i
    description: Transform longitude with Shift by 180 to ensure positive values,
      then scale to remove decimals.
    tags: &id002
    - spatial
    - coordinate
    tests:
    - not_null
  - name: lat
    description: Physical latitude value in degrees (-90 to 90).
    tags:
    - spatial
    - coordinate
    tests:
    - not_null
  - name: lon
    description: Physical longitude value in degrees (-180 to 360).
    tags:
    - spatial
    - coordinate
    tests:
    - not_null
- name: fct_aifs_spread
  description: Fact model for ECMWF AIFS ensemble spread forecasts.
  columns:
  - name: surrogate_merge_key
    description: Primary key placeholder for upsert operations.
    tags: &id003
    - key
    - metadata
    tests:
    - unique
    - not_null
  - name: weather_model
    description: The weather model source identifier (e.g., GFS, IFS, AIFS).
    tags: &id004
    - metadata
    - weather_model
    tests:
    - not_null
    - accepted_values:
        values:
        - GFS
        - IFS
        - AIFS
  - name: cycle_date
    description: The date when the weather model run cycle was initialized.
    tags: &id005
    - temporal
    - date
    tests:
    - not_null
  - name: cycle_hour
    description: The cycle run hour (UTC, e.g., 0, 6, 12, or 18).
    tags: &id006
    - temporal
    - hour
    tests:
    - not_null
    - accepted_values:
        values:
        - 0
        - 12
  - name: forecast_step_hours
    description: Forecast lead time hours from the model initialization.
    tags: &id007
    - temporal
    - forecast
    tests:
    - not_null
  - name: valid_date
    description: The date when the forecast is valid.
    tags: &id008
    - temporal
    - date
    tests:
    - not_null
  - name: valid_hour
    description: The hour (UTC) when the forecast is valid.
    tags: &id009
    - temporal
    - hour
    tests:
    - not_null
  - name: lat_i
    description: Transform latitude with Shift by 90/360 to ensure positive values,
      then scale to remove decimals.
    tags: *id001
    tests:
    - not_null
  - name: lon_i
    description: Transform longitude with Shift by 180 to ensure positive values,
      then scale to remove decimals.
    tags: *id002
    tests:
    - not_null
  - name: pressure_level_hpa
    description: Isobaric pressure level in hPa (e.g. 500, 850).
    tags: &id011
    - meteorological
    - pressure
    tests:
    - not_null
    - dbt_utils.expression_is_true:
        expression: "pressure_level_hpa >= 1 AND pressure_level_hpa <= 1100"
        config:
          severity: warn
  - name: temp_spread_kelvin
    description: Ensemble spread (standard deviation) for temperature in Kelvin.
    tags: &id024
    - meteorological
    - temperature
    tests:
    - not_null
    - dbt_utils.expression_is_true:
        expression: "temp_spread_kelvin >= 0 AND temp_spread_kelvin <= 50"
        config:
          severity: warn
  - name: temp_spread_celsius
    description: Ensemble spread (standard deviation) for temperature in Celsius.
    tags: &id025
    - meteorological
    - temperature
    tests:
    - not_null
    - dbt_utils.expression_is_true:
        expression: "temp_spread_celsius >= 0 AND temp_spread_celsius <= 50"
        config:
          severity: warn
  - name: geopotential_height_spread_m
    description: Ensemble spread (standard deviation) for geopotential height in meters.
    tags: &id026
    - meteorological
    - height
    tests:
    - not_null
    - dbt_utils.expression_is_true:
        expression: "geopotential_height_spread_m >= 0 AND geopotential_height_spread_m <= 2000"
        config:
          severity: warn
  - name: dbt_updated_at
    description: Standard update timestamp.
    tags: &id010
    - temporal
    - metadata
    tests:
    - not_null
