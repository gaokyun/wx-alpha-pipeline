        expression: "dewpoint_2m_celsius >= -93 AND dewpoint_2m_celsius <= 67"
        config:
          severity: warn
  - name: msl_pressure_hpa
    description: Mean sea level atmospheric pressure in hPa.
    tags: &id016
    - meteorological
    - pressure
    tests:
    - not_null
    - dbt_utils.expression_is_true:
        expression: "msl_pressure_hpa >= 800 AND msl_pressure_hpa <= 1100"
        config:
          severity: warn
  - name: total_precipitation_m
    description: Total accumulated precipitation in meters.
    tags: &id017
    - meteorological
    - precipitation
    tests:
    - not_null
    - dbt_utils.expression_is_true:
        expression: "total_precipitation_m >= 0 AND total_precipitation_m <= 10"
        config:
          severity: warn
  - name: total_precipitation_mm
    description: Total accumulated precipitation in millimeters.
