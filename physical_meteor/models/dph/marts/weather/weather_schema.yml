        expression: "temp_2m_celsius >= -93 AND temp_2m_celsius <= 67"
        config:
          severity: warn
  - name: dewpoint_2m_kelvin
    description: Dewpoint temperature at 2 meters above ground in Kelvin.
    tags: &id014
    - meteorological
    - dewpoint
    tests:
    - not_null
