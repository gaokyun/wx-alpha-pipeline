name: 'physical_meteor'
version: '1.0.0'
config-version: 2

profile: 'physical_meteor'

# These configurations specify where dbt should look for different types of files.
# The `model-paths` config, for example, states that models in this project can be
# found in the "models/" directory. You probably won't need to change these!
model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:         # directories to be removed by `dbt clean`
  - "target"
  - "dbt_packages"

# dbt_project.yml
on-run-start:
  # This block will ONLY execute when running against DuckDB
  - >
    {% if target.type == 'duckdb' %}
      INSTALL httpfs; LOAD httpfs;
      INSTALL aws; LOAD aws;
      INSTALL delta; LOAD delta;
      CREATE OR REPLACE SECRET oci_main (
          TYPE S3,
          KEY_ID '{{ env_var("OCI_ACCESS_KEY") }}',
          SECRET '{{ env_var("OCI_SECRET_KEY") }}',
          REGION 'us-ashburn-1',
          ENDPOINT 'idt2nq7cpbfu.compat.objectstorage.us-ashburn-1.oraclecloud.com',
          URL_STYLE 'path',
          USE_SSL 'true',
          SCOPE 's3://'
      );
      -- 3. Set Global Session Defaults
      -- These ensure DuckDB's internal S3 client routes correctly to OCI
      SET s3_endpoint = 'idt2nq7cpbfu.compat.objectstorage.us-ashburn-1.oraclecloud.com';
      SET s3_url_style = 'path';
      SET s3_region = 'us-ashburn-1';

      -- 4. Senior DE Performance & Stability Tuning
      SET parquet_metadata_cache = true;
      -- SET s3_allow_http_fallback = false; -- Prevents the 169.254.169.254 metadata hang
    {% elif target.type == 'postgres' %}
      -- Postgres specific setup (No DuckDB commands allowed here!)
      SELECT 1;

    {% elif target.type == 'snowflake' %}
      -- Placeholder for your upcoming Snowflake bootstrap
      SELECT 1;
    {% endif %}

# Configuring models
# Full documentation: https://docs.getdbt.com/docs/configuring-models
models:
  physical_meteor: # This must match your project name above
    
    # ---------------------------------------------------------
    # 1. SILVER LAYER (Staging: Light cleaning, renaming, casting)
    # ---------------------------------------------------------
    staging:
      +materialized: view      # Staging should always be views to save space
      +schema: silver          # Puts these in PHYSICAL_METEOR_DB.SILVER
      
      gfs:
        +tags: ["gfs", "meteorology", "staging"]
        
      ecmwf:
        +tags: ["ecmwf", "meteorology", "staging"]

    # ---------------------------------------------------------
    # 2. GOLD LAYER (Marts: Heavy joins, business logic, consensus)
    # ---------------------------------------------------------
    marts:
      +materialized: table     # Marts should be tables for fast BI querying
      +schema: gold            # Puts these in PHYSICAL_METEOR_DB.GOLD
      
      weather:                 # Replaces 'combined' for better domain naming
        +tags: ["consensus", "daily_batch"]
