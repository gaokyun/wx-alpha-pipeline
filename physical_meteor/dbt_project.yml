name: 'physical_meteor'
version: '1.0.0'
config-version: 2

profile: 'physical_meteor'

# These configurations specify where dbt should look for different types of files.
# The `model-paths` config, for example, states that models in this project can be
# found in the "models/" directory. You probably won't need to change these!
model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

on-run-start:
  - >
    {% if target.type == 'duckdb' %}
      SET temp_directory = '/opt/airflow/data/duckdb_tmp/';
      SET max_temp_directory_size = '10GB';
      INSTALL httpfs; LOAD httpfs;
      INSTALL aws; LOAD aws;
      INSTALL delta; LOAD delta;
      INSTALL mysql; LOAD mysql;

    {% elif target.type == 'postgres' %}
      -- Postgres specific setup (No DuckDB commands allowed here!)
      SELECT 1;

    {% elif target.type == 'snowflake' %}
      -- Placeholder for your upcoming Snowflake bootstrap
      SELECT 1;
    {% endif %}

clean-targets:         # directories to be removed by `dbt clean`
  - "target"
  - "dbt_packages"

# dbt_project.yml

seeds:
  physical_meteor:  
    +schema: bronze

# Configuring models
# Full documentation: https://docs.getdbt.com/docs/configuring-models
# Configuring models
models:
  physical_meteor:
    
    # --- LOCAL DUCKDB-POSTGRES HYBRID (DPH) ---
    # duckdb-postgres hybrid (DPH) with bronze storage in OCI s3 compatible storage,
    # silver staging area in DuckDB and 
    # gold marts in PostgreSQL

    dph:
      +enabled: true
      # --- SILVER LAYER --- 
      staging:
        +materialized: view
        +schema: silver      # Results in: main_silver (DuckDB default)
        gfs:
          +tags: ["gfs", "silver", "staging"]
        ecmwf:
          +tags: ["ecmwf", "silver", "staging"]

      # --- GOLD LAYER ---
      marts:
        +database: PHYSICAL_METEOR_DB # All marts write to PostgreSQL
        weather:
          # 1. The "Kitchen" (Where the atomic tables are cooked)
          atomic:
            +schema: gold
            +materialized: incremental
            +incremental_strategy: delete+insert #insert_overwrite
            +tags: ["marts", "gold", "atomic"]
          
          # 2. The "Dining Room" (The only thing users see)
          fct_unified_forecast:
            +enabled: "{{ target.type == 'postgres' }}"
            +schema: gold      # Results in: main_gold (custom gold schema in postgres)
            +materialized: view
            +tags: ["unified", "gold", "marts"]

    # --- POSTGRES-DUCKDB HYBRID (PDH) ---
    # postgres-duckdb hybrid (PDH) using postgres target and FDW foreign tables
    pdh:
      +enabled: true
      # --- SILVER LAYER ---
      staging:
        +materialized: view
        +schema: pdh_staging
        gfs:
          +tags: ["gfs", "pdh", "staging"]
        ecmwf:
          +tags: ["ecmwf", "pdh", "staging"]

      # --- GOLD LAYER ---
      marts:
        +schema: pdh_marts
        weather:
          # 1. Atomic Tables
          atomic:
            +materialized: table
            +tags: ["marts", "pdh", "atomic"]
          
          # 2. Unified Views
          fct_unified_forecast:
            +enabled: "{{ target.type == 'postgres' }}"
            +materialized: view
            +tags: ["unified", "pdh", "marts"]

    # --- ORACLE ADW MEDALLION LAYERS ---
    adw:
      +enabled: true
      staging:
        +schema: "{{ 'PHYSICAL_METEOR_STG' if target.type == 'oracle' else 'adw_silver' }}"
        +materialized: view
      marts:
        +schema: "{{ 'PHYSICAL_METEOR_GOLD' if target.type == 'oracle' else 'adw_gold' }}"
        dim:
          +materialized: incremental
          +incremental_strategy: delete+insert
        fct:
          +materialized: incremental
          +incremental_strategy: delete+insert
          +incremental_predicates: ["DBT_INTERNAL_DEST.CYCLE_DATE >= TRUNC(SYSDATE) - 1"]

    # --- DUCKDB + MYSQL HYBRID (DMH) ---
    dmh:
      +enabled: true
      staging:
        +schema: "{{ 'silver' if target.type == 'mysql' or target.name == 'dev_duckdb_mysql' else 'dmh_silver' }}"
        +materialized: view
      marts:
        +database: PHYSICAL_METEOR_GOLD
        +schema: "{{ 'PHYSICAL_METEOR_GOLD' if target.type == 'mysql' or target.name == 'dev_duckdb_mysql' else 'dmh_gold' }}"
        dim:
          +materialized: incremental
          +incremental_strategy: append
        fct:
          +materialized: incremental
          +incremental_strategy: append


  