---
x-airflow-common:
  &airflow-common
  image: custom-weather-airflow:latest
  build:  
    context: .
    dockerfile: Dockerfile.airflow
  env_file:
    - ${ENV_FILE_PATH:-.env}
  environment:
    &airflow-common-env
    # --- Infrastructure & Backend ---
    AIRFLOW__CORE__EXECUTOR: CeleryExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:${POSTGRES_PASS}@postgres/airflow
    AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://airflow:${POSTGRES_PASS}@postgres/airflow
    AIRFLOW__CELERY__BROKER_URL: redis://:@redis:6379/0
    
    # Security & Auth (Synchronized across all nodes)
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY}
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW__WEBSERVER__SECRET_KEY}
    AIRFLOW__API__SECRET_KEY: ${AIRFLOW__API__SECRET_KEY}  # <-- ADD THIS LINE FOR AIRFLOW 3
    AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW__API_AUTH__JWT_SECRET}
    AIRFLOW__API__AUTH_BACKENDS: 'airflow.api.auth.backend.session,airflow.api.auth.backend.basic_auth'
    
    AIRFLOW_CONFIG: '/opt/airflow/config/airflow.cfg'
    AIRFLOW__CORE__EXECUTION_API_SERVER_URL: 'http://airflow-apiserver:8080/execution/'

    # --- UI & Auth ---
    AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'

    # --- Scheduler Performance Tuning ---
    AIRFLOW__SCHEDULER__SCHEDULER_IDLE_SLEEP_TIME: 1
    AIRFLOW__SCHEDULER__MAX_DAGRUN_TO_CREATE_PER_LOOP: 10
    AIRFLOW__SCHEDULER__CATCHUP_BY_DEFAULT: 'false'
    AIRFLOW__SCHEDULER__MAX_TIS_PER_QUERY: 16
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: 'true'
    AIRFLOW__SCHEDULER__SCHEDULER_HEALTH_CHECK_SERVER_PORT: 8974

    # --- External Connections (Snowflake/Postgres) ---
    AIRFLOW_CONN_POSTGRES_DEFAULT: 'postgres://airflow:${POSTGRES_PASS}@postgres:5432/airflow'
    AIRFLOW_CONN_SNOWFLAKE_CONN: >
      {
        "conn_type": "snowflake",
        "login": "${SNOW_USER}",
        "password": "${SNOW_PASS}",
        "extra": {
          "account": "${SNOW_ACC}",
          "warehouse": "${SNOW_WARE}",
          "database": "${SNOW_DB}",
          "schema": "${SNOW_SCHEMA}",
          "role": "${SNOW_ROLE:-ACCOUNTADMIN}"
        }
      }
    # --- Cloud Provider (AWS) ---
    AWS_ACCESS_KEY_ID: ${AWS_ACC_KEY}
    AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_KEY}
    AWS_REGION: ${AWS_REGION}
    AWS_S3_BUCKET: ${AWS_S3_BUCKET}
    JUPYTER_PASSWORD_HASH: ${JUPYTER_PASS_HASH}
  volumes:
    - ${AIRFLOW_PROJ_DIR:-.}/dags:/opt/airflow/dags
    - ${AIRFLOW_PROJ_DIR:-.}/logs:/opt/airflow/logs
    - ${AIRFLOW_PROJ_DIR:-.}/config:/opt/airflow/config
    - ${AIRFLOW_PROJ_DIR:-.}/plugins:/opt/airflow/plugins
    - /var/run/docker.sock:/var/run/docker.sock
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    &airflow-common-depends-on
    redis:
      condition: service_healthy
    postgres:
      condition: service_healthy

networks:
  default:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: ${POSTGRES_PASS}
      POSTGRES_DB: airflow
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: always

  redis:
    image: redis:7.2-bookworm
    expose:
      - 6379
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 30s
      retries: 50
      start_period: 30s
    restart: always

  dbt-postgres:
    build:
      context: .
      dockerfile: Dockerfile.dbt-postgres
    image: dbt-postgres:latest
    working_dir: /usr/app
    env_file:
      - .env
    environment:
      - DBT_LOG_PATH=/tmp/dbt/logs
      - DBT_TARGET_PATH=/tmp/dbt/target
    volumes:
      - ${AIRFLOW_PROJ_DIR:-.}:/usr/app:rw
    entrypoint: ["bash","-c","sleep infinity"]
    depends_on:
      - postgres
    restart: "no"

  dbt-snowflake:
    build:
      context: .
      dockerfile: Dockerfile.dbt-snowflake
    container_name: dbt-snowflake-runner
    env_file:
      - .env
    environment:
      - DBT_LOG_PATH=/tmp/dbt/logs
      - DBT_TARGET_PATH=/tmp/dbt/target
      - SNOWFLAKE_ACCOUNT=${SNOW_ACC}
      - SNOWFLAKE_USER=${SNOW_USER}
      - SNOWFLAKE_PASSWORD=${SNOW_PASS}
      - SNOWFLAKE_WAREHOUSE=${SNOW_WARE} 
      - SNOWFLAKE_DATABASE=${SNOW_DB}
      - SNOWFLAKE_SCHEMA=${SNOW_SCHEMA}     
    volumes:
      - ${AIRFLOW_PROJ_DIR:-.}:/usr/app:ro
    entrypoint: ["bash","-c","sleep infinity"]
    restart: "no"

  jupyterlab:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: jupyter-developer-env
    # ADD THIS LINE:
    entrypoint: ["/bin/bash", "-c"]
    # We add a quick 'mkdir' to ensure the user has a place to write config
    command: >
      "mkdir -p /home/airflow/.local /home/airflow/.jupyter && 
       jupyter lab --ip=0.0.0.0 --port=9330 --no-browser --ServerApp.root_dir='/opt/airflow'"
    working_dir: /opt/airflow
    user: "50000:0"  # Force the Airflow user
    ports:
      - "9330:9330"
    volumes:
      - /home/airflow/dev/notebooks:/opt/airflow/notebooks
      - /home/airflow/dev/data:/opt/airflow/data
      - /home/airflow/dev/wx-alpha-pipeline:/opt/airflow/wx-alpha-pipeline
    environment:
      - JUPYTER_ENABLE_LAB=yes
      - JUPYTER_PASSWORD_HASH=${JUPYTER_PASS_HASH}
      - AIRFLOW_UID=50000 
    restart: always

  airflow-apiserver:
    <<: *airflow-common
    command: api-server
    ports:
      - "9340:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/api/v2/version"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-dag-processor:
    <<: *airflow-common
    command: dag-processor
    healthcheck:
      test: ["CMD-SHELL", 'airflow jobs check --job-type DagProcessorJob --hostname "$${HOSTNAME}"']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-worker:
    <<: *airflow-common
    hostname: airflow-worker
    container_name: airflow-worker
    command: celery worker
    healthcheck:
      test:
        - "CMD-SHELL"
        - 'celery --app airflow.providers.celery.executors.celery_executor.app inspect ping -d "celery@airflow-worker" || celery --app airflow.executors.celery_executor.app inspect ping -d "celery@airflow-worker"'
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    environment:
      <<: *airflow-common-env
      DUMB_INIT_SETSID: "0"
      AIRFLOW__LOGGING__SERVER_LOG_URL: "http://airflow-worker:8793/log"
    restart: always
    volumes:
      # 1. Restore the code and logs mapping
      - ${AIRFLOW_PROJ_DIR:-.}/dags:/opt/airflow/dags
      - ${AIRFLOW_PROJ_DIR:-.}/logs:/opt/airflow/logs
      - ${AIRFLOW_PROJ_DIR:-.}/config:/opt/airflow/config
      - ${AIRFLOW_PROJ_DIR:-.}/plugins:/opt/airflow/plugins
      # 2. Keep the Docker socket for dbt
      - /var/run/docker.sock:/var/run/docker.sock    
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      <<: *airflow-common-depends-on
      airflow-apiserver:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

  airflow-triggerer:
    <<: *airflow-common
    command: triggerer
    healthcheck:
      test: ["CMD-SHELL", 'airflow jobs check --job-type TriggererJob --hostname "$${HOSTNAME}"']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        if [[ -z "${AIRFLOW_UID}" ]]; then
          echo
          echo -e "\033[1;33mWARNING!!!: AIRFLOW_UID not set!\e[0m"
          echo "If you are on Linux, you SHOULD follow the instructions below to set "
          echo "AIRFLOW_UID environment variable, otherwise files will be owned by root."
          echo "For other operating systems you can get rid of the warning with manually created .env file:"
          echo "    See: https://airflow.apache.org/docs/apache-airflow/stable/howto/docker-compose/index.html#setting-the-right-airflow-user"
          echo
          export AIRFLOW_UID=$$(id -u)
        fi
        one_meg=1048576
        mem_available=$$(($$(getconf _PHYS_PAGES) * $$(getconf PAGE_SIZE) / one_meg))
        cpus_available=$$(grep -cE 'cpu[0-9]+' /proc/stat)
        disk_available=$$(df / | tail -1 | awk '{print $$4}')
        warning_resources="false"
        if (( mem_available < 4000 )) ; then
          echo
          echo -e "\033[1;33mWARNING!!!: Not enough memory available for Docker.\e[0m"
          echo "At least 4GB of memory required. You have $$(numfmt --to iec $$((mem_available * one_meg)))"
          echo
          warning_resources="true"
        fi
        if (( cpus_available < 2 )); then
          echo
          echo -e "\033[1;33mWARNING!!!: Not enough CPUS available for Docker.\e[0m"
          echo "At least 2 CPUs recommended. You have $${cpus_available}"
          echo
          warning_resources="true"
        fi
        if (( disk_available < one_meg * 10 )); then
          echo
          echo -e "\033[1;33mWARNING!!!: Not enough Disk space available for Docker.\e[0m"
          echo "At least 10 GBs recommended. You have $$(numfmt --to iec $$((disk_available * 1024 )))"
          echo
          warning_resources="true"
        fi
        if [[ $${warning_resources} == "true" ]]; then
          echo
          echo -e "\033[1;33mWARNING!!!: You have not enough resources to run Airflow (see above)!\e[0m"
          echo "Please follow the instructions to increase amount of resources available:"
          echo "   https://airflow.apache.org/docs/apache-airflow/stable/howto/docker-compose/index.html#before-you-begin"
          echo
        fi
        echo
        echo "Creating missing opt dirs if missing:"
        echo
        mkdir -v -p /opt/airflow/{logs,dags,plugins,config}
        echo
        echo "Airflow version:"
        /entrypoint airflow version
        echo
        echo "Files in shared volumes:"
        echo
        ls -la /opt/airflow/{logs,dags,plugins,config}
        echo
        echo "Running airflow config list to create default config file if missing."
        echo
        /entrypoint airflow config list >/dev/null
        echo
        echo "Files in shared volumes:"
        echo
        ls -la /opt/airflow/{logs,dags,plugins,config}
        echo
        echo "Change ownership of files in /opt/airflow to ${AIRFLOW_UID}:0"
        echo
        chown -R "${AIRFLOW_UID}:0" /opt/airflow/
        echo
        echo "Change ownership of files in shared volumes to ${AIRFLOW_UID}:0"
        echo
        chown -v -R "${AIRFLOW_UID}:0" /opt/airflow/{logs,dags,plugins,config}
        echo
        echo "Files in shared volumes:"
        echo
        ls -la /opt/airflow/{logs,dags,plugins,config}
        
        echo "🔧 Forcing DB migration to ensure tables exist..."
        airflow db migrate
        
        echo "🔧 Initializing custom Airflow Pools..."
        airflow pools import /opt/airflow/config/airflow-pools.json
        echo "✅ Infrastructure automation complete."

    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_MIGRATE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: ${AIRFLOW_UI_USER:-airflow}
      _AIRFLOW_WWW_USER_PASSWORD: ${AIRFLOW_UI_PASS:-airflow}
      _PIP_ADDITIONAL_REQUIREMENTS: ''
    user: "0:0"

  airflow-cli:
    <<: *airflow-common
    profiles:
      - debug
    environment:
      <<: *airflow-common-env
      CONNECTION_CHECK_MAX_COUNT: "0"
    command:
      - bash
      - -c
      - airflow
    depends_on:
      <<: *airflow-common-depends-on

  flower:
    <<: *airflow-common
    command: celery flower
    profiles:
      - flower
    ports:
      - "5555:5555"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:5555/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

volumes:
  postgres-db-volume: